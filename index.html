<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abdo Code</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo">Abdo <span>Code</span></div>
  <nav>
    <a href="#home">Home</a>
    <a href="#courses">Courses</a>
    <a href="#about">About</a>
  </nav>
  <button class="login-btn">Login</button>
</header>

<section class="hero" id="home">
  <div class="hero-text">
    <h1>Learn Programming</h1>
    <p>From zero to professional 🚀</p>

    <div class="buttons">
      <button class="primary" onclick="startNow()">Start Now</button>
      <button class="secondary">Browse Courses</button>
    </div>
  </div>
</section>

<section class="courses" id="courses">
  <h2>Popular Courses</h2>


  <section class="channels">
  <h2>أفضل القنوات التعليمية 📺</h2>
  <div class="channel-grid">
    <!-- Elzero Web School -->
    <a href="https://www.youtube.com/@ElzeroWebSchool" target="_blank" class="channel-card">
      <img src="https://yt3.googleusercontent.com/ytc/AIdro_nS6X7oGv9G..." alt="Elzero">
      <p>Osama Elzero</p>
    </a>

    <!-- Ahmed Adel -->
    <a href="https://www.youtube.com/@CodeZilla" target="_blank" class="channel-card">
      <p>Ahmed Adel</p>
    </a>

    <!-- Mohammed Abu-Hadhoud -->
    <a href="https://www.youtube.com/@ProgrammingAdvices" target="_blank" class="channel-card">
      <p>M. Abu-Hadhoud</p>
    </a>

    <!-- OctCode / Hormuz -->
    <a href="https://www.youtube.com/@OctCode" target="_blank" class="channel-card">
      <p>OctCode</p>
    </a>
  </div>
</section>
  <div class="grid">

    <div class="card">
      <h3>HTML</h3>
      <p>Learn structure of web pages</p>
      <button>Start</button>
    </div>

    <div class="card">
      <h3>CSS</h3>
      <p>Design modern websites</p>
      <button>Start</button>
    </div>

    <div class="card">
      <h3>JavaScript</h3>
      <p>Make websites interactive</p>
      <button>Start</button>
    </div>

  </div>
</section>

<script src="script.js"></script>

<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>تسجيل الدخول</h2>
    <form id="loginForm">
      <input type="text" placeholder="اسم المستخدم" required>
      <input type="email" placeholder="البريد الإلكتروني" required>
      <input type="password" placeholder="كلمة المرور" required>
      <button type="submit" class="primary">إنشاء حساب</button>
    </form>
  </div>
</div>
  
</body>
</html>
